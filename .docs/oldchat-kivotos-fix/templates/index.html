<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OldChat for Kivotos</title>
    <link rel="icon" href="/static/momotalklogo.png" type="image/png">
    {% if current_theme_config.get('extra_html') %}
        {{ current_theme_config['extra_html'] | safe }}
    {% endif %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/' + current_theme + '/' + theme_css_file) }}">
    <meta name="uid" content="{{ session.get('uid', '') }}">
    <meta name="theme-merge-messages" content="{{ current_theme_config.get('merge_messages', False) | lower }}">
    <style>
        /* ===== 全局重置 ===== */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden !important;
            overscroll-behavior: none;
        }

        /* ===== 移动端专用样式（仅布局，颜色继承主题） ===== */
        @media (max-width: 768px) {
            html, body {
                touch-action: pan-y;
                overscroll-behavior: none;
            }

            body.mobile-mode .app-container {
                position: relative;
                overflow: hidden;
                width: 100vw;
                height: calc(var(--vh, 1vh) * 100);
                margin: 0;
                padding: 0;
            }

            /* 侧边栏 */
            body.mobile-mode .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
                transition: transform 0.3s ease;
                box-shadow: 2px 0 8px rgba(0,0,0,0.1);
                overflow-y: auto;
                padding-top: env(safe-area-inset-top, 0px);
                padding-bottom: env(safe-area-inset-bottom, 0px);
                margin: 0;
            }
            body.mobile-mode .sidebar.hidden {
                transform: translateX(-100%);
            }

            /* 聊天区域 */
            body.mobile-mode .chat-area {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                width: 100% !important;
                height: 100% !important;
                z-index: 20;
                transform: translateX(0) !important;
                transition: transform 0.3s ease;
                overflow: hidden;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
            }
            body.mobile-mode .chat-area.hidden {
                transform: translateX(100%) !important;
            }

            /* 聊天头部 - 只调整内边距，颜色由主题决定 */
            body.mobile-mode .chat-header {
                padding-top: calc(env(safe-area-inset-top, 0px) + 8px) !important;
                padding-left: 12px;
                padding-right: 12px;
                padding-bottom: 8px;
                min-height: calc(44px + env(safe-area-inset-top, 0px));
                display: flex;
                align-items: center;
                position: relative;
                z-index: 2;
            }
            /* 返回按钮 - 跟随主题颜色 */
            body.mobile-mode .chat-header .back-btn {
                display: inline-block;
                margin-right: 10px;
                background: none;
                border: none;
                font-size: 1.4rem;
                color: inherit;  /* 继承父级 .chat-header 的文字颜色，由主题控制 */
                cursor: pointer;
                padding: 0 6px;
                line-height: 1;
                opacity: 0.85;   /* 略微柔和，可自定义 */
            }
            body.mobile-mode .chat-header .back-btn:active {
                opacity: 0.5;
            }

            /* 消息列表 */
            body.mobile-mode .messages {
                height: calc(100% - 60px - 110px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) !important;
                max-height: calc(100% - 60px - 110px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                padding: 10px 12px;
                margin: 0;
            }

            /* 输入区域 */
            body.mobile-mode .input-area {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)) !important;
                padding-left: 8px;
                padding-right: 8px;
                padding-top: 6px;
                background: var(--bg-color, #fff);
                border-top: 1px solid var(--border-color, #e0e0e0);
                z-index: 5;
                max-height: 180px;
            }
            body.mobile-mode .input-area textarea {
                font-size: 16px;
                min-height: 36px;
                max-height: 80px;
                width: 100%;
                padding: 6px 10px;
                border-radius: 8px;
                border: 1px solid var(--border-color, #ccc);
                resize: none;
                background: var(--input-bg, #f5f5f5);
                color: var(--text-color, #333);
            }
            body.mobile-mode .input-area .input-buttons {
                display: flex;
                gap: 4px;
                flex-wrap: wrap;
                margin-top: 4px;
            }
            body.mobile-mode .input-area .input-buttons .btn {
                padding: 4px 10px;
                font-size: 0.85rem;
                border-radius: 6px;
                border: none;
                background: var(--btn-bg, #e8e8e8);
                color: var(--text-color, #333);
                cursor: pointer;
            }
            body.mobile-mode .input-area .input-buttons .btn.primary {
                background: var(--primary-color, #4a6cf7);
                color: #fff;
            }
            body.mobile-mode .input-area .input-buttons .btn:active {
                opacity: 0.7;
            }

            /* 侧边栏头部 */
            body.mobile-mode .sidebar .sidebar-header {
                padding: calc(env(safe-area-inset-top, 0px) + 10px) 12px 10px 12px;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 4px;
            }
            body.mobile-mode .sidebar .sidebar-header .user-info {
                flex: 1;
                font-size: 0.9rem;
            }
            body.mobile-mode .sidebar .sidebar-header .user-info small {
                font-size: 0.7rem;
                opacity: 0.8;
            }
            body.mobile-mode .sidebar .sidebar-header .icon-btn {
                background: none;
                border: none;
                font-size: 1.1rem;
                padding: 4px 6px;
                cursor: pointer;
                opacity: 0.8;
                color: var(--text-color, #333);
            }
            body.mobile-mode .sidebar .sidebar-header .icon-btn:active {
                opacity: 0.5;
            }

            body.mobile-mode .contact-item {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-color, #eee);
                cursor: pointer;
            }
            body.mobile-mode .contact-item:active {
                background: var(--hover-bg, #f0f0f0);
            }
            body.mobile-mode .contact-item .name {
                font-weight: 500;
            }
            body.mobile-mode .contact-item .uid {
                font-size: 0.75rem;
                color: #999;
            }

            body.mobile-mode .voice-bg-wave {
                display: none;
            }

            body.mobile-mode .quote-preview {
                padding: 4px 8px;
                background: var(--quote-bg, #f0f0f0);
                border-radius: 6px;
                margin-bottom: 4px;
                font-size: 0.85rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        }

        /* 桌面端 .back-btn 默认隐藏 */
        .chat-header .back-btn {
            display: none;
        }
    </style>
    <!-- 动态计算 vh -->
    <script>
        function setVH() {
            var vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', function() {
            setTimeout(setVH, 200);
        });
        setVH();
    </script>
</head>
<body>
    <div class="app-container">
        <div class="voice-bg-wave" id="voiceBgWave"><div class="voice-bg-wave-bars"></div></div>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/me" target="_blank" style="text-decoration: none; color: inherit; flex:1;">
                    <span class="user-info">{{ session.get('user_name', '用户') }}<br><small>OldChat for Kivotos</small></span>
                </a>
                <button id="pinSidebarBtn" class="icon-btn" title="取消固定"><i class="fa-solid fa-thumbtack"></i></button>
                <button id="aboutBtn" class="icon-btn" title="关于"><i class="fa-solid fa-circle-info"></i></button>
                <button id="logoutBtn" class="icon-btn" title="退出登录"><i class="fa-solid fa-right-from-bracket"></i></button>
                <button id="themeMenuBtn" class="icon-btn" title="切换主题"><i class="fa-solid fa-palette"></i></button>
            </div>
            <div class="contact-list" id="contactList"></div>
        </aside>

        <!-- 聊天区域 -->
        <main class="chat-area">
            <div class="chat-header" id="chatHeader">
                <span>OldChat for Kivotos</span>
            </div>
            <div class="messages" id="messagesContainer"></div>

            <div class="input-area" id="inputArea">
                <div class="quote-preview" id="quotePreview" style="display: none;">
                    <span class="quote-preview-text"></span>
                    <button id="cancelQuoteBtn" class="icon-btn" title="取消引用">✖</button>
                </div>
                <textarea id="messageInput" placeholder="输入消息... (Enter发送, Shift+Enter换行)" rows="1"></textarea>
                <div class="input-buttons">
                    <button id="nowPlayingBtn" class="btn" style="display:none;" title="跳转到正在播放的语音"><i class="fa-solid fa-music"></i></button>
                    <button id="sendImageBtn" class="btn">图片</button>
                    <button id="emojiPlazaBtn" class="btn">表情</button>
                    <button id="moreBtn" class="btn">更多</button>
                    <button id="sendBtn" class="btn primary">发送</button>
                </div>
                <div class="more-menu" id="moreMenu" style="display: none;">
                    <button id="sendFileBtn">上传文件</button>
                    <button id="sendUrlImageBtn">发送直链图片 (仅限网页端)</button>
                    <button id="sendUrlVoiceBtn">发送直链音频</button>
                    <button id="sendEmoticonBtn">内置表情</button>
                </div>
                <input type="file" id="fileInput" style="display: none" multiple>
            </div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div class="url-input-overlay" id="urlInputOverlay" style="display:none;">
        <div class="url-input-dialog">
            <div class="url-input-title">输入图片链接</div>
            <input type="text" id="urlImageInput" placeholder="https://...">
            <div class="url-input-actions">
                <button id="urlInputCancel" class="btn">取消</button>
                <button id="urlInputSend" class="btn primary">发送</button>
            </div>
        </div>
    </div>
    <div class="theme-menu" id="themeMenu" style="display: none;">
        <div class="theme-menu-title">选择主题</div>
        <div class="theme-menu-list" id="themeMenuList"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
